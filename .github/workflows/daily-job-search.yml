name: Tagesvorschlaege Stellenanzeigen

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Passende Stellen suchen
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import date
          from pathlib import Path

          USER_AGENT = "stellenanzeigen-sammler-cloud/1.0 (GitHub Actions)"
          MIN_VERIFIED_EMPLOYEES = 1000

          def get_json(url, timeout=20):
              request = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  return json.load(response)

          payload = get_json("https://www.arbeitnow.com/api/job-board-api", timeout=30)
          listings = payload.get("data", [])

          role_words = ["systemingenieur", "systems engineer", "testingenieur", "test engineer", "entwicklungsingenieur", "development engineer", "projektingenieur", "projektmanager", "project manager", "autonom", "adas", "machine learning", "data scientist", "elektrotechnik", "elektrische systeme", "aerospace", "luftfahrt"]
          north_words = [
              "hamburg", "bremen", "hannover", "braunschweig", "kiel", "rostock", "lübeck", "oldenburg", "wolfsburg",
              "niedersachsen", "osnabrück", "osnabrueck", "göttingen", "goettingen", "hildesheim", "salzgitter", "celle", "lüneburg", "lueneburg",
              "emden", "wilhelmshaven", "aurich", "leer", "papenburg", "meppen", "cloppenburg", "vechta", "verden", "nienburg", "hameln",
              "ostwestfalen", "owl", "bielefeld", "paderborn", "minden", "gütersloh", "guetersloh", "herford", "detmold", "lemgo", "bad oeynhausen",
              "löhne", "loehne", "porta westfalica", "rheda-wiedenbrück", "rheda-wiedenbrueck", "verl", "halle westfalen", "höxter", "hoexter"
          ]
          trusted_large_companies = [
              "airbus", "airbus defence", "airbus helicopters", "arianegroup", "boeing", "collins aerospace", "dlr", "esa", "fraunhofer", "ge aviation", "ge vernova", "honeywell", "mtu", "ohb", "rolls-royce", "safran", "tesat",
              "bmw", "audi", "bosch", "bosch rexroth", "continental", "daimler", "forvia", "hella", "mercedes", "mercedes-benz", "porsche", "rheinmetall", "schaeffler", "thyssenkrupp", "volkswagen", "vw", "zf",
              "abb", "basf", "bayer", "b braun", "b. braun", "beiersdorf", "carl zeiss", "dmg mori", "dräger", "draeger", "e.on", "enercon", "evonik", "festo", "hensoldt", "knorr-bremse", "krones", "liebherr", "nordex", "philips", "phoenix contact", "rwe", "sartorius", "schneider electric", "siemens", "siemens energy", "siemens gamesa", "tesa", "vestas", "wago", "zeiss",
              "beckhoff", "bertelsmann", "claas", "dspace", "dr. oetker", "harting", "kion", "lenze", "miele", "melitta", "phoenix contact", "schüco", "schueco", "sennheiser", "still", "wago",
              "deutsche bahn", "db", "deutsche post", "dhl", "hapag-lloyd", "jungheinrich", "kühne", "kuehne", "kühne+nagel", "kuehne+nagel", "kuehne nagel", "körber", "koerber", "lufthansa", "lufthansa technik", "otto", "otto group", "tchibo",
              "accenture", "adesso", "amazon", "aws", "capgemini", "google", "ibm", "microsoft", "nvidia", "sap", "t-systems", "telekom"
          ]
          exclude_words = ["working student", "werkstudent", "internship", "praktikum", "trainee", "ausbildung", "student assistant", "abschlussarbeit"]
          employee_cache = {}

          def clean_html(value):
              return re.sub(r"<[^>]+>", " ", value or "")

          def normalize_company_name(value):
              value = (value or "").strip()
              value = re.sub(r"\b(gmbh|ag|se|kg|kgaa|inc|ltd|limited|llc|corp|corporation|holding|co\.?|company)\b", " ", value, flags=re.IGNORECASE)
              value = re.sub(r"[^A-Za-zÀ-ž0-9 &+.-]+", " ", value)
              return re.sub(r"\s+", " ", value).strip()

          def contains_term(text, term):
              pattern = r"(?<![a-z0-9])" + re.escape(term.lower()) + r"(?![a-z0-9])"
              return re.search(pattern, text.lower()) is not None

          def matches_any(text, terms):
              return any(contains_term(text, term) for term in terms)

          def employee_count_from_wikidata(company):
              query = normalize_company_name(company)
              if not query:
                  return None
              key = query.lower()
              if key in employee_cache:
                  return employee_cache[key]

              employee_cache[key] = None
              try:
                  ids = []
                  for language in ("en", "de"):
                      search_params = urllib.parse.urlencode({
                          "action": "wbsearchentities",
                          "search": query,
                          "language": language,
                          "format": "json",
                          "limit": "3"
                      })
                      search = get_json(f"https://www.wikidata.org/w/api.php?{search_params}", timeout=12)
                      ids.extend(item.get("id") for item in search.get("search", []) if item.get("id"))
                      if ids:
                          break

                  max_employees = None
                  for entity_id in dict.fromkeys(ids):
                      entity_params = urllib.parse.urlencode({
                          "action": "wbgetentities",
                          "ids": entity_id,
                          "props": "claims",
                          "format": "json"
                      })
                      entity_payload = get_json(f"https://www.wikidata.org/w/api.php?{entity_params}", timeout=12)
                      claims = entity_payload.get("entities", {}).get(entity_id, {}).get("claims", {})
                      for claim in claims.get("P1128", []):
                          amount = claim.get("mainsnak", {}).get("datavalue", {}).get("value", {}).get("amount")
                          if amount is None:
                              continue
                          try:
                              employees = int(float(str(amount).replace("+", "")))
                          except ValueError:
                              continue
                          max_employees = employees if max_employees is None else max(max_employees, employees)

                  employee_cache[key] = max_employees
              except Exception:
                  employee_cache[key] = None
              return employee_cache[key]

          candidates = []

          for job in listings:
              title = job.get("title", "").strip()
              company = job.get("company_name", "").strip()
              location = job.get("location", "").strip()
              link = job.get("url", "").strip()
              description = clean_html(job.get("description", ""))
              haystack = f"{title} {company} {location} {description}".lower()
              company_text = f"{company} {normalize_company_name(company)}".lower()

              if any(word in haystack for word in exclude_words):
                  continue

              role_hits = sum(word in haystack for word in role_words)
              if not role_hits or not link:
                  continue

              is_north = any(word in haystack for word in north_words)
              employee_count = employee_count_from_wikidata(company)
              is_trusted_company = matches_any(company_text, trusted_large_companies)
              is_verified_large_company = employee_count is not None and employee_count >= MIN_VERIFIED_EMPLOYEES

              # Strenger Filter: unbekannte Firmen kommen nicht mehr durch, auch wenn die Rolle gut klingt.
              if not (is_trusted_company or is_verified_large_company):
                  continue

              score = role_hits * 4
              if is_north:
                  score += 10
              if is_trusted_company:
                  score += 18
              if is_verified_large_company:
                  score += 14
              if "germany" in haystack or is_north:
                  score += 2

              candidates.append((score, title, company, location, link, is_trusted_company, employee_count, is_verified_large_company))

          candidates.sort(key=lambda item: item[0], reverse=True)

          suggestions = []
          seen = set()

          for score, title, company, location, link, is_trusted_company, employee_count, is_verified_large_company in candidates:
              if link.lower() in seen:
                  continue
              seen.add(link.lower())
              slug = re.sub(r"[^a-z0-9]+", "-", f"{company}-{title}".lower()).strip("-")[:80]
              if is_trusted_company and is_verified_large_company:
                  size_note = f"Etablierter Arbeitgeber aus Kuratliste; Wikidata nennt ca. {employee_count} Mitarbeitende."
              elif is_trusted_company:
                  size_note = "Etablierter Arbeitgeber aus Kuratliste; keine sichere Wikidata-Mitarbeiterzahl gefunden."
              else:
                  size_note = f"Wikidata bestaetigt ein Unternehmen mit mindestens 1000 Mitarbeitenden mit ca. {employee_count} Mitarbeitenden."
              suggestions.append({
                  "id": f"cloud-{slug}",
                  "title": title,
                  "company": company,
                  "location": location or "Deutschland",
                  "url": link,
                  "priority": "Hoch" if score >= 34 else "Mittel",
                  "status": "Interessant",
                  "foundAt": date.today().isoformat(),
                  "nextStep": "Anzeige pruefen",
                  "notes": f"Cloud-Vorschlag: nur etablierte grosse Arbeitgeber; Norddeutschland inklusive Niedersachsen und Ostwestfalen wird priorisiert. {size_note}"
              })
              if len(suggestions) == 5:
                  break

          Path("stellen-vorschlaege.json").write_text(json.dumps(suggestions, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Vorschlaege speichern
        id: commit
        run: |
          git config user.name "Stellenanzeigen Bot"
          git config user.email "actions@github.com"
          git add stellen-vorschlaege.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Aktualisiere Stellenvorschlaege"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
