name: Tagesvorschlaege Stellenanzeigen

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Passende Stellen suchen
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import date
          from pathlib import Path

          USER_AGENT = "stellenanzeigen-sammler-cloud/1.0 (GitHub Actions)"

          def get_json(url, timeout=20):
              request = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  return json.load(response)

          payload = get_json("https://www.arbeitnow.com/api/job-board-api", timeout=30)
          listings = payload.get("data", [])

          role_words = ["systemingenieur", "systems engineer", "testingenieur", "test engineer", "entwicklungsingenieur", "development engineer", "projektingenieur", "projektmanager", "project manager", "autonom", "adas", "machine learning", "data scientist", "elektrotechnik", "elektrische systeme", "aerospace", "luftfahrt"]
          north_words = [
              "hamburg", "bremen", "hannover", "braunschweig", "kiel", "rostock", "lübeck", "oldenburg", "wolfsburg",
              "niedersachsen", "osnabrück", "osnabrueck", "göttingen", "goettingen", "hildesheim", "salzgitter", "celle", "lüneburg", "lueneburg",
              "emden", "wilhelmshaven", "aurich", "leer", "papenburg", "meppen", "cloppenburg", "vechta", "verden", "nienburg", "hameln",
              "ostwestfalen", "owl", "bielefeld", "paderborn", "minden", "gütersloh", "guetersloh", "herford", "detmold", "lemgo", "bad oeynhausen",
              "löhne", "loehne", "porta westfalica", "rheda-wiedenbrück", "rheda-wiedenbrueck", "verl", "halle westfalen", "höxter", "hoexter"
          ]
          large_companies = [
              "airbus", "lufthansa", "siemens", "bosch", "continental", "volkswagen", "vw", "mercedes", "bmw", "porsche", "audi", "deutsche bahn", "db ",
              "rheinmetall", "thyssenkrupp", "nordex", "enercon", "honeywell", "rolls-royce", "ibm", "dhl", "deutsche post", "sap", "bayer",
              "basf", "zeiss", "carl zeiss", "sartorius", "philips", "tesla", "tesa", "beiersdorf", "otto", "tchibo", "jungheinrich", "hella",
              "zf", "dräger", "draeger", "still", "kion", "lenze", "claas", "liebherr", "mtu", "knorr-bremse", "hapag-lloyd", "kühne", "kuehne",
              "festo", "abb", "schneider electric", "general electric", "ge aviation", "safran", "collins aerospace", "boeing", "tesat", "hensoldt", "ohb",
              "dlr", "esa", "fraunhofer", "helmholtz", "max planck"
          ]
          large_company_indicators = [
              "konzern", "unternehmensgruppe", "group", "global", "weltweit", "international", "standorte", "locations",
              "mitarbeiter", "employees", "mehr als 500", "über 500", "ueber 500", ">500", "500+", "1.000", "1000", "10.000", "10000"
          ]
          exclude_words = ["working student", "werkstudent", "internship", "praktikum", "trainee", "ausbildung", "student assistant", "abschlussarbeit"]
          employee_cache = {}

          def clean_html(value):
              return re.sub(r"<[^>]+>", " ", value or "")

          def normalize_company_name(value):
              value = (value or "").strip()
              value = re.sub(r"\b(gmbh|ag|se|kg|kgaa|inc|ltd|limited|llc|corp|corporation|group|holding|co\.?|company)\b", " ", value, flags=re.IGNORECASE)
              value = re.sub(r"[^A-Za-zÀ-ž0-9 &+-]+", " ", value)
              return re.sub(r"\s+", " ", value).strip()

          def employee_count_from_wikidata(company):
              query = normalize_company_name(company)
              if not query:
                  return None
              key = query.lower()
              if key in employee_cache:
                  return employee_cache[key]

              employee_cache[key] = None
              try:
                  search_params = urllib.parse.urlencode({
                      "action": "wbsearchentities",
                      "search": query,
                      "language": "en",
                      "format": "json",
                      "limit": "3"
                  })
                  search = get_json(f"https://www.wikidata.org/w/api.php?{search_params}", timeout=12)
                  ids = [item.get("id") for item in search.get("search", []) if item.get("id")]
                  if not ids:
                      search_params = urllib.parse.urlencode({
                          "action": "wbsearchentities",
                          "search": query,
                          "language": "de",
                          "format": "json",
                          "limit": "3"
                      })
                      search = get_json(f"https://www.wikidata.org/w/api.php?{search_params}", timeout=12)
                      ids = [item.get("id") for item in search.get("search", []) if item.get("id")]

                  max_employees = None
                  for entity_id in ids:
                      entity_params = urllib.parse.urlencode({
                          "action": "wbgetentities",
                          "ids": entity_id,
                          "props": "claims",
                          "format": "json"
                      })
                      entity_payload = get_json(f"https://www.wikidata.org/w/api.php?{entity_params}", timeout=12)
                      claims = entity_payload.get("entities", {}).get(entity_id, {}).get("claims", {})
                      for claim in claims.get("P1128", []):
                          amount = claim.get("mainsnak", {}).get("datavalue", {}).get("value", {}).get("amount")
                          if amount is None:
                              continue
                          try:
                              employees = int(float(str(amount).replace("+", "")))
                          except ValueError:
                              continue
                          max_employees = employees if max_employees is None else max(max_employees, employees)

                  employee_cache[key] = max_employees
              except Exception:
                  employee_cache[key] = None
              return employee_cache[key]

          candidates = []

          for job in listings:
              title = job.get("title", "").strip()
              company = job.get("company_name", "").strip()
              location = job.get("location", "").strip()
              link = job.get("url", "").strip()
              description = clean_html(job.get("description", ""))
              haystack = f"{title} {company} {location} {description}".lower()

              if any(word in haystack for word in exclude_words):
                  continue

              role_hits = sum(word in haystack for word in role_words)
              if not role_hits or not link:
                  continue

              is_north = any(word in haystack for word in north_words)
              employee_count = employee_count_from_wikidata(company)
              has_verified_large_company = employee_count is not None and employee_count >= 500
              has_large_company_signal = has_verified_large_company or any(word in haystack for word in large_companies) or any(word in haystack for word in large_company_indicators)

              # Wikidata liefert nicht fuer jede Firma eine Mitarbeiterzahl. Kleine/unbekannte Firmen werden nur noch zugelassen,
              # wenn Rolle und Norddeutschland sehr gut passen.
              if not has_large_company_signal and not (is_north and role_hits >= 3):
                  continue

              score = role_hits * 4
              if is_north:
                  score += 8
              if has_verified_large_company:
                  score += 16
              elif has_large_company_signal:
                  score += 10
              else:
                  score -= 6
              if "germany" in haystack or is_north:
                  score += 2

              candidates.append((score, title, company, location, link, has_verified_large_company, employee_count, has_large_company_signal))

          candidates.sort(key=lambda item: item[0], reverse=True)

          suggestions = []
          seen = set()

          for score, title, company, location, link, has_verified_large_company, employee_count, has_large_company_signal in candidates:
              if link.lower() in seen:
                  continue
              seen.add(link.lower())
              slug = re.sub(r"[^a-z0-9]+", "-", f"{company}-{title}".lower()).strip("-")[:80]
              if has_verified_large_company:
                  size_note = f"Wikidata-Mitarbeiterzahl gefunden: ca. {employee_count} Mitarbeitende."
              elif has_large_company_signal:
                  size_note = "Grossunternehmen-Signal erkannt, aber keine sichere Mitarbeiterzahl gefunden."
              else:
                  size_note = "Kein sicheres Groessen-Signal, aber fachlich und regional sehr passend."
              suggestions.append({
                  "id": f"cloud-{slug}",
                  "title": title,
                  "company": company,
                  "location": location or "Deutschland",
                  "url": link,
                  "priority": "Hoch" if score >= 22 else "Mittel",
                  "status": "Interessant",
                  "foundAt": date.today().isoformat(),
                  "nextStep": "Anzeige pruefen",
                  "notes": f"Cloud-Vorschlag: passend zu den Zielrollen; Norddeutschland inklusive Niedersachsen und Ostwestfalen sowie Unternehmen mit wahrscheinlich >500 Mitarbeitenden werden priorisiert. {size_note}"
              })
              if len(suggestions) == 3:
                  break

          Path("stellen-vorschlaege.json").write_text(json.dumps(suggestions, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Vorschlaege speichern
        id: commit
        run: |
          git config user.name "Stellenanzeigen Bot"
          git config user.email "actions@github.com"
          git add stellen-vorschlaege.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Aktualisiere Stellenvorschlaege"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
